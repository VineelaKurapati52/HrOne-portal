{% extends 'base.html' %}

{% block title %}HrOne | Sign In{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 75vh;">
    <div class="card login-card shadow-lg border-0" style="max-width: 430px; width: 100%; border-radius: 20px; overflow: hidden;">
        <div class="login-header text-center text-white py-5" style="background: linear-gradient(135deg, #0f766e, #0d9488);">
            <div class="mb-2">
                <i class="fas fa-users-cog fa-4x text-light animate-logo"></i>
            </div>
            <h2 class="fw-bold mb-0">HrOne Portal</h2>
            <p class="text-white-50 small mb-0">Secure HR Management Gateway</p>
        </div>
        
        <div class="card-body p-5 bg-white">
            <form action="{{ url_for('login') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label text-secondary fw-semibold small">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0" style="border-radius: 10px 0 0 10px;">
                            <i class="fas fa-user text-muted"></i>
                        </span>
                        <input type="text" name="username" class="form-control border-start-0" required placeholder="Enter username" style="border-radius: 0 10px 10px 0;">
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label text-secondary fw-semibold small">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0" style="border-radius: 10px 0 0 10px;">
                            <i class="fas fa-lock text-muted"></i>
                        </span>
                        <input type="password" name="password" class="form-control border-start-0" required placeholder="Enter password" style="border-radius: 0 10px 10px 0;">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-3 shadow-sm" style="border-radius: 10px; font-size: 1.05rem; letter-spacing: 0.5px;">
                    <i class="fas fa-sign-in-alt me-2"></i>Sign In
                </button>
            </form>
            
            <div class="mt-4 pt-3 border-top text-center">
                <div class="p-3 bg-light rounded-3 d-inline-block w-100">
                    <div class="text-secondary fw-semibold small mb-2"><i class="fas fa-info-circle me-1 text-info"></i>Demo Credentials</div>
                    <div class="row g-0 text-center">
                        <div class="col-4 px-1 border-end">
                            <span class="text-muted d-block small" style="font-size: 0.7rem;">Admin</span>
                            <code class="text-dark font-monospace" style="font-size: 0.72rem;">admin / admin123</code>
                        </div>
                        <div class="col-4 px-1 border-end">
                            <span class="text-muted d-block small" style="font-size: 0.7rem;">Manager</span>
                            <code class="text-dark font-monospace" style="font-size: 0.72rem;">manager / manager123</code>
                        </div>
                        <div class="col-4 px-1">
                            <span class="text-muted d-block small" style="font-size: 0.7rem;">Employee</span>
                            <code class="text-dark font-monospace" style="font-size: 0.72rem;">user / user123</code>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.login-card {
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.login-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 35px rgba(15, 118, 110, 0.15) !important;
}
.animate-logo {
    animation: pulse 2.5s infinite;
}
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}
</style>
{% endblock %}
